# ╔══════════════════════════════════════════════════════════════╗
# ║  DevPulse Performance — Weekly Schedule Only                ║
# ║  Runs every Sunday 3am UTC, or manually                     ║
# ║  NOT triggered on every push (saves minutes)                ║
# ╚══════════════════════════════════════════════════════════════╝

name: '⚡ Performance Pipeline'

on:
  schedule:
    - cron: '0 3 * * 0' # Every Sunday 3am UTC
  workflow_dispatch:    # Manual trigger only

env:
  NODE_VERSION: '20'
  BUNDLE_BUDGET_KB: ${{ vars.BUNDLE_BUDGET_KB || '1000' }}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Bundle size check ─────────────────────────────────────────
  bundle-size:
    name: '📦 Bundle Size Check'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          CI: true

      - name: Check bundle size
        working-directory: frontend
        run: |
          python3 - << 'PYEOF'
          import os, gzip, pathlib

          dist      = pathlib.Path("dist")
          budget_kb = int(os.environ.get("BUNDLE_BUDGET_KB", "1000"))
          total_gz  = sum(
            len(gzip.compress(f.read_bytes(), compresslevel=9))
            for f in dist.rglob("*.js")
          )
          total_kb = round(total_gz / 1024, 1)
          ok       = total_gz <= budget_kb * 1024

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as fh:
            fh.write(f"## 📦 Bundle Size\n\n")
            fh.write(f"Total JS (gzip): **{total_kb} KB** | Budget: {budget_kb} KB | {'✅ OK' if ok else '⚠️ Over budget'}\n")

          if not ok:
            print(f"[WARN] Bundle {total_kb} KB exceeds {budget_kb} KB budget")
          else:
            print(f"[OK] Bundle {total_kb} KB within {budget_kb} KB budget")
          PYEOF
        env:
          BUNDLE_BUDGET_KB: ${{ env.BUNDLE_BUDGET_KB }}

  # ─── Backend smoke test ────────────────────────────────────────
  backend-smoke:
    name: '🔥 Backend Smoke Test'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        working-directory: backend
        run: npm ci --no-audit --no-fund

      - name: Smoke test (p99 < 500ms)
        working-directory: backend
        run: node smoke-test.js 500
        env:
          NODE_ENV: test
          TOKEN_ENCRYPTION_SECRET: '00000000000000000000000000000000'
          JWT_SECRET: '00000000000000000000000000000000'
          GITHUB_CLIENT_ID: 'ci-smoke-client-id'
          GITHUB_CLIENT_SECRET: 'ci-smoke-client-secret'
          DATABASE_URL: ''
          REDIS_URL: ''
