# Dependabot Auto-Merge
# Lightweight: only runs for Dependabot PRs, no test runner — just merges.
# CI is intentionally skipped for patch/minor Dependabot PRs (see devpulse-ci.yml).

name: '🤖 Dependabot Auto-Merge'

on:
  pull_request:
    types: [opened, labeled]   # removed 'synchronize' — reduces triggers

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: '🤖 Auto-merge patch/minor'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Get metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'

      - name: Auto-merge patch and minor
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Label major updates for manual review
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['major-update', 'needs-manual-review'],
            });
