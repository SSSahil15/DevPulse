# ╔══════════════════════════════════════════════════════════════╗
# ║  DevPulse CI — Lean Edition (minute-budget friendly)        ║
# ║  Runs only on main push & PRs to main                       ║
# ║  E2E, Docker, and Security moved to weekly schedule         ║
# ╚══════════════════════════════════════════════════════════════╝

name: DevPulse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

permissions:
  contents: read

# Cancel redundant runs on the same branch/PR immediately
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Job 1: Backend lint + test ────────────────────────────────
  backend:
    name: '🔧 Backend'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Run tests
        run: |
          set +e
          npm test 2>&1
          echo "exit=$?" >> $GITHUB_OUTPUT
        id: tests
        continue-on-error: true

      - name: Summary
        if: always()
        run: |
          echo "### 🔧 Backend" >> $GITHUB_STEP_SUMMARY
          echo "Tests: ${{ steps.tests.outputs.exit == '0' && '✅' || '⚠️ check logs' }}" >> $GITHUB_STEP_SUMMARY

  # ─── Job 2: Frontend build + test ──────────────────────────────
  frontend:
    name: '🎨 Frontend'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build
        env:
          CI: true

      - name: Run tests
        run: |
          set +e
          npm test 2>&1
          echo "exit=$?" >> $GITHUB_OUTPUT
        id: tests
        continue-on-error: true

      - name: Upload dist
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3

      - name: Summary
        if: always()
        run: |
          echo "### 🎨 Frontend" >> $GITHUB_STEP_SUMMARY
          DIST=$(du -sh dist 2>/dev/null | cut -f1 || echo "N/A")
          echo "Build size: $DIST | Tests: ${{ steps.tests.outputs.exit == '0' && '✅' || '⚠️ check logs' }}" >> $GITHUB_STEP_SUMMARY

  # ─── Job 3: Deploy gate (main push only) ───────────────────────
  deploy-gate:
    name: '🚀 Deploy Gate'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Evaluate
        run: |
          BACKEND="${{ needs.backend.result }}"
          FRONTEND="${{ needs.frontend.result }}"
          if [ "$BACKEND" = "success" ] && [ "$FRONTEND" = "success" ]; then
            echo "✅ All checks passed — deployment approved" >> $GITHUB_STEP_SUMMARY
          else
            echo "🚫 Deployment blocked — Backend: $BACKEND | Frontend: $FRONTEND" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
