# ╔══════════════════════════════════════════════════════════════╗
# ║  DevPulse CI — Ultra-Lean Edition                           ║
# ║  • Only runs on PRs (Vercel handles main branch deploy)     ║
# ║  • Path-filtered: skips docs/config-only changes           ║
# ║  • Single job: backend + frontend in one runner             ║
# ║  • Skips tests for Dependabot patch/minor PRs               ║
# ╚══════════════════════════════════════════════════════════════╝

name: DevPulse CI

on:
  pull_request:
    branches: [main]
    # Only run when actual source code changes — skip docs, config, markdown
    paths:
      - 'backend/src/**'
      - 'backend/package*.json'
      - 'frontend/src/**'
      - 'frontend/public/**'
      - 'frontend/package*.json'
      - 'frontend/vite.config.*'
      - 'frontend/api/**'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

permissions:
  contents: read

# Cancel the previous run on the same PR immediately when a new commit is pushed
concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ci:
    name: '🔧 Build & Test'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Skip heavy CI for Dependabot patch/minor — auto-merge handles those
    # Full CI still runs for Dependabot major updates and all human PRs
    if: |
      github.actor != 'dependabot[bot]' ||
      contains(github.event.pull_request.title, 'major')

    steps:
      - uses: actions/checkout@v4

      # ── Backend ──────────────────────────────────────────────────
      - name: '⚙️ Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: '📦 Install backend deps'
        working-directory: backend
        run: npm ci --no-audit --no-fund

      - name: '🧪 Backend tests'
        working-directory: backend
        run: npm test
        continue-on-error: true

      # ── Frontend ─────────────────────────────────────────────────
      - name: '📦 Install frontend deps'
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: '🏗️ Frontend build'
        working-directory: frontend
        run: npm run build
        env:
          CI: true

      - name: '🧪 Frontend tests'
        working-directory: frontend
        run: npm test
        continue-on-error: true

      # ── Summary ──────────────────────────────────────────────────
      - name: '📋 Summary'
        if: always()
        run: |
          DIST=$(du -sh frontend/dist 2>/dev/null | cut -f1 || echo "N/A")
          echo "### ✅ CI Complete" >> $GITHUB_STEP_SUMMARY
          echo "Frontend bundle: **$DIST**" >> $GITHUB_STEP_SUMMARY
