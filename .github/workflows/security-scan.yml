# ╔══════════════════════════════════════════════════════════════╗
# ║  DevPulse Security — Weekly Schedule Only                   ║
# ║  Runs every Monday 2am UTC, or manually via workflow_dispatch║
# ║  NOT triggered on every push (saves minutes)                ║
# ╚══════════════════════════════════════════════════════════════╝

name: '🛡️ Security Pipeline'

on:
  schedule:
    - cron: '0 2 * * 1' # Every Monday 2am UTC
  workflow_dispatch:    # Manual trigger only

env:
  NODE_VERSION: '20'
  DOCKER_IMAGE: devpulse-backend

permissions:
  contents: read
  security-events: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── npm audit ─────────────────────────────────────────────────
  npm-audit:
    name: '📦 npm Audit'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install & audit backend
        working-directory: backend
        run: |
          npm ci --no-audit --no-fund
          set +e
          npm audit --audit-level=critical 2>&1 | tee /tmp/backend-audit.txt

      - name: Install & audit frontend
        working-directory: frontend
        run: |
          npm ci --no-audit --no-fund
          set +e
          npm audit --audit-level=critical 2>&1 | tee /tmp/frontend-audit.txt

      - name: Summary
        if: always()
        run: |
          echo "## 📦 npm Audit" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "=== Backend ===" >> $GITHUB_STEP_SUMMARY
          cat /tmp/backend-audit.txt >> $GITHUB_STEP_SUMMARY
          echo "=== Frontend ===" >> $GITHUB_STEP_SUMMARY
          cat /tmp/frontend-audit.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ─── Trivy filesystem scan ─────────────────────────────────────
  trivy-scan:
    name: '🛡️ Trivy Filesystem Scan'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          scanners: vuln,secret
          exit-code: '0'

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

      - name: Trivy scan (table summary)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          scanners: vuln,secret
          exit-code: '0'

  # ─── Secrets scan ──────────────────────────────────────────────
  secret-scan:
    name: '🔐 Secrets Scan (TruffleHog)'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          extra_args: --only-verified
