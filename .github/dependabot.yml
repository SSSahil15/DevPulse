version: 2
updates:
  # ── Node.js Backend ──────────────────────────────────────────
  - package-ecosystem: 'npm'
    directory: '/backend'
    schedule:
      interval: 'monthly'   # Was 'weekly' — monthly = ~4x fewer PRs = ~4x fewer CI runs
    open-pull-requests-limit: 3
    labels:
      - 'dependencies'
      - 'backend'
    commit-message:
      prefix: 'fix(deps)'
      include: 'scope'
    groups:
      backend-minor-patch:
        update-types:
          - 'minor'
          - 'patch'
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  # ── Node.js Frontend ─────────────────────────────────────────
  - package-ecosystem: 'npm'
    directory: '/frontend'
    schedule:
      interval: 'monthly'   # Was 'weekly'
    open-pull-requests-limit: 3
    labels:
      - 'dependencies'
      - 'frontend'
    commit-message:
      prefix: 'fix(deps)'
      include: 'scope'
    groups:
      frontend-minor-patch:
        update-types:
          - 'minor'
          - 'patch'
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  # ── Python AI Service ─────────────────────────────────────────
  - package-ecosystem: 'pip'
    directory: '/ai'
    schedule:
      interval: 'monthly'   # Was 'weekly'
    open-pull-requests-limit: 2
    labels:
      - 'dependencies'
      - 'ai'
    commit-message:
      prefix: 'fix(deps)'
      include: 'scope'
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  # ── GitHub Actions ────────────────────────────────────────────
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'   # Was 'weekly'
    open-pull-requests-limit: 2
    labels:
      - 'dependencies'
      - 'ci'
    commit-message:
      prefix: 'chore(ci)'
      include: 'scope'
